name: location_tracking
description: A Flutter plugin for receiving location updates even when the app is terminated. Works on both iOS and Android with support for background execution.
version: 2.2.0
homepage: https://github.com/sombathdanet/location-tracking
repository: https://github.com/sombathdanet/location-tracking
issue_tracker: https://github.com/sombathdanet/location-tracking/issues
platforms:
  android:
  ios:


environment:
  sdk: '>=3.3.2 <4.0.0'  # Updated to meet pub.dev requirements
  flutter: ">=1.12.0"
dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  yaml: ^3.1.2

flutter:
  plugin:
    platforms:
      android:
        package: yukams.app.background_locator_2
        pluginClass: BackgroundLocatorPlugin
      ios:
        pluginClass: BackgroundLocatorPlugin
